name: CSOP Platform CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'   # Weekly security scan every Monday 06:00 UTC

jobs:
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install bandit pip-audit semgrep
      - name: Bandit SAST
        run: bandit -r . -f json -o bandit-report.json --exit-zero
      - name: pip-audit SCA
        run: pip-audit --format json --output pip-audit.json || true
      - name: Semgrep
        run: semgrep --config p/python --config p/security-audit --json > semgrep.json || true
      - name: Trivy IaC Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: infrastructure/terraform
          format: table
          exit-code: "0"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-reports
          path: "*.json"

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install pytest pytest-cov
      - run: pytest tests/unit/ -v --cov=. --cov-report=xml || true

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.6.0" }
      - working-directory: infrastructure/terraform
        run: |
          terraform init -backend=false
          terraform validate
          terraform fmt -check -recursive

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test, terraform-validate]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy dashboard to staging
        run: echo "Deploy Streamlit dashboard to staging ECS task"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: echo "Deploy to production — requires manual approval via environment protection"
